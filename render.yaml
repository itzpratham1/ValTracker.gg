services:
  # ── Flask API Backend ──
  - type: web
    name: valtracker-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py api:app
    envVars:
      - key: HENRIKDEV_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://valtracker-frontend.onrender.com,https://valtracker.gg,https://valtracker.live
    healthCheckPath: /api/health
