services:
  # ── Astro Frontend (Static + SSR for /share/[id]) ──
  - type: web
    name: valtracker-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && node dist/server/entry.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_API_URL
        sync: false
        value: https://valtracker-api.onrender.com
    healthCheckPath: /

  # ── Flask API Backend ──
  - type: web
    name: valtracker-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py api:app
    envVars:
      - key: HENRIKDEV_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://valtracker-frontend.onrender.com,https://valtracker.gg,https://valtracker.live
    healthCheckPath: /api/health
